<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, initial-scale=1">
<title>EV Interest Heatmap — April 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #0f1117;
    color: #e0e0e0;
    min-height: 100vh;
    padding: 36px 48px 28px;
  }

  /* ── HEADER ── */
  .slide-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 20px; }
  .slide-title { font-size: 26px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
  .slide-subtitle { font-size: 14px; color: #888; margin-top: 4px; }
  .brent-tag { display: inline-block; background: #2a1a1a; color: #ff6b6b; font-weight: 600; font-size: 13px; padding: 3px 10px; border-radius: 4px; margin-left: 8px; }
  .slide-meta { font-size: 12px; color: #555; text-align: right; }

  /* ── TABLE ── */
  table.heatmap { width: 100%; border-collapse: collapse; font-size: 12px; table-layout: fixed; }
  table.heatmap th { padding: 7px 4px; text-align: center; font-weight: 600; font-size: 11px; color: #999; border-bottom: 2px solid #333; white-space: nowrap; }
  th.metric-col { text-align: left !important; width: 155px; padding-left: 8px !important; }
  th.c-hdr { font-size: 12.5px; color: #fff; letter-spacing: -0.3px; }

  table.heatmap td { padding: 6px 4px; text-align: center; border-bottom: 1px solid #1e2030; font-size: 11.5px; font-weight: 500; vertical-align: middle; line-height: 1.3; font-variant-numeric: tabular-nums; }
  td.ml { text-align: left; font-size: 10.5px; color: #aaa; font-weight: 500; padding-left: 8px; }

  tr.sep td { padding: 5px 0; border-bottom: 2px solid #333; font-size: 9.5px; color: #555; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }

  tr.cbar td { background: #1a1c26; padding: 6px 4px; border-top: 1px solid #2a2d3d; border-bottom: 1px solid #2a2d3d; }
  tr.cbar td.cbar-cell { color: #999; font-size: 11px; font-weight: 600; text-align: center; }

  /* ── HEAT COLORS ── */
  .h5 { background: #0d4a2e; color: #4ade80; font-weight: 700; }
  .h4 { background: #1a3d2a; color: #86efac; }
  .h3 { background: #2a3520; color: #bef264; }
  .h2 { background: #3a3520; color: #fde047; }
  .h1 { background: #222; color: #777; }
  .h0 { background: #1a1a1a; color: #555; }
  .hn { background: #3a1a1a; color: #f87171; }

  /* signal qualitative */
  .sq { background: #0d4a2e; color: #4ade80; }
  .sm { background: #2a3520; color: #bef264; }
  .sw { background: #2a2520; color: #999; }
  .sn { background: #1a1a1a; color: #555; }

  /* swing badges */
  .sb { display: inline-block; font-size: 9.5px; font-weight: 700; padding: 2px 7px; border-radius: 3px; letter-spacing: 0.3px; }
  .sb-up    { background: #166534; color: #fff; }
  .sb-up2   { background: #15803d; color: #fff; }
  .sb-watch { background: #854d0e; color: #fde047; }
  .sb-decel { background: #7c2d12; color: #fdba74; }
  .sb-na    { background: #27272a; color: #71717a; }

  /* gas shock chart */
  .gs-section { margin-top: 28px; padding-top: 20px; border-top: 1px solid #1e2030; }
  .gs-title { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 4px; letter-spacing: -0.3px; }
  .gs-sub { font-size: 11px; color: #888; margin-bottom: 16px; }
  .gs-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; }
  .gs-cat { background: #14161e; border-radius: 6px; padding: 12px 14px; }
  .gs-cat-hdr { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; padding: 4px 9px; border-radius: 3px; display: inline-block; margin-bottom: 6px; }
  .gs-cat-direct  { background: #3a1a1a; color: #f87171; }
  .gs-cat-volcano { background: #3a2a14; color: #fbbf24; }
  .gs-cat-brent   { background: #1a2a3a; color: #60a5fa; }
  .gs-cat-desc { font-size: 10px; color: #888; margin-bottom: 12px; line-height: 1.5; }
  .gs-cat-desc b { color: #ccc; font-weight: 600; }
  .gs-cat-desc .gs-signal { display: block; margin-top: 6px; padding-top: 6px; border-top: 1px solid #1f2230; color: #666; }
  .gs-cat-desc .gs-signal b { color: #aaa; }
  .gs-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; margin-bottom: 10px; }
  .gs-tag { font-size: 8.5px; padding: 2px 7px; border-radius: 10px; font-weight: 600; letter-spacing: 0.3px; text-transform: uppercase; border: 1px solid; }
  .gs-tag-direct  { background: rgba(239,68,68,0.08);  border-color: rgba(239,68,68,0.3);  color: #fca5a5; }
  .gs-tag-volcano { background: rgba(245,158,11,0.08); border-color: rgba(245,158,11,0.3); color: #fcd34d; }
  .gs-tag-brent   { background: rgba(59,130,246,0.08); border-color: rgba(59,130,246,0.3); color: #93c5fd; }

  /* pump scatter v2 (alt) */
  .ps-section { margin-top: 28px; padding-top: 20px; border-top: 1px solid #1e2030; }
  .ps-title { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 4px; letter-spacing: -0.3px; }
  .ps-sub { font-size: 11px; color: #888; margin-bottom: 16px; line-height: 1.5; max-width: 920px; }
  .ps-chart { background: #14161e; border-radius: 6px; padding: 18px 14px 14px; }
  .ps-legend-row { display: flex; gap: 22px; margin-top: 12px; font-size: 10.5px; color: #aaa; justify-content: center; flex-wrap: wrap; }
  .ps-legend-row .ps-ld { display: inline-block; width: 11px; height: 11px; border-radius: 50%; vertical-align: middle; margin-right: 6px; }

  /* GT vs gas scatter */
  .gt-section { margin-top: 28px; padding-top: 20px; border-top: 1px solid #1e2030; }
  .gt-title { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 4px; letter-spacing: -0.3px; }
  .gt-sub { font-size: 11px; color: #888; margin-bottom: 16px; line-height: 1.5; max-width: 960px; }
  .gt-chart { background: #14161e; border-radius: 6px; padding: 18px 14px 14px; }
  .gt-legend-row { display: flex; gap: 22px; margin-top: 12px; font-size: 10.5px; color: #aaa; justify-content: center; flex-wrap: wrap; }
  .gt-legend-row .gt-ld { display: inline-block; width: 11px; height: 11px; border-radius: 50%; vertical-align: middle; margin-right: 6px; }
  .gs-row { display: grid; grid-template-columns: 78px 1fr 64px; align-items: center; gap: 6px; margin-bottom: 4px; font-size: 10.5px; }
  .gs-country { color: #ccc; text-align: right; font-weight: 500; }
  .gs-bar-track { position: relative; height: 16px; background: #0d0e15; border-radius: 2px; overflow: visible; }
  .gs-bar-avg { position: absolute; top: 0; left: 0; height: 100%; border-radius: 2px; min-width: 2px; }
  .gs-bar-direct  { background: linear-gradient(90deg, #7c2d12, #ef4444); }
  .gs-bar-volcano { background: linear-gradient(90deg, #78350f, #f59e0b); }
  .gs-bar-brent   { background: linear-gradient(90deg, #1e3a8a, #3b82f6); }
  .gs-bar-peak-tick { position: absolute; top: -2px; bottom: -2px; width: 2px; background: #fff; box-shadow: 0 0 3px rgba(255,255,255,0.5); }
  .gs-num { color: #fff; font-weight: 600; font-variant-numeric: tabular-nums; text-align: left; font-size: 10.5px; }
  .gs-num-peak { color: #777; font-weight: 400; font-size: 9.5px; margin-left: 3px; }
  .gs-legend { font-size: 9.5px; color: #666; margin-top: 12px; display: flex; gap: 14px; align-items: center; }
  .gs-legend-bar { display: inline-block; width: 16px; height: 6px; background: linear-gradient(90deg,#7c2d12,#ef4444); border-radius: 1px; vertical-align: middle; margin-right: 4px; }
  .gs-legend-tick { display: inline-block; width: 2px; height: 10px; background: #fff; vertical-align: middle; margin-right: 4px; }

  /* footer */
  .slide-footer { margin-top: 14px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
  .legend { display: flex; gap: 14px; font-size: 10px; color: #777; align-items: center; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .lsw { width: 12px; height: 12px; border-radius: 2px; display: inline-block; }
  .slide-source { font-size: 9px; color: #444; }
</style>
</head>
<body>

<div class="slide-header">
  <div>
    <div class="slide-title" id="title">Is the Energy Crisis Driving EV Interest?</div>
    <div class="slide-subtitle" id="subtitle"></div>
  </div>
  <div class="slide-meta" id="meta"></div>
</div>

<div id="grid"></div>

<div id="gas-shock"></div>

<div id="scatter"></div>

<div id="pump-scatter"></div>

<div id="gt-scatter"></div>

<div class="slide-footer">
  <div class="legend">
    <div class="legend-item"><span class="lsw" style="background:#0d4a2e"></span>Strong</div>
    <div class="legend-item"><span class="lsw" style="background:#2a3520"></span>Moderate</div>
    <div class="legend-item"><span class="lsw" style="background:#3a3520"></span>Mild</div>
    <div class="legend-item"><span class="lsw" style="background:#1a1a1a"></span>No data</div>
    <div class="legend-item"><span class="lsw" style="background:#3a1a1a"></span>Negative</div>
    <div class="legend-item" style="margin-left:12px"><span class="sb sb-up">UP</span> Crisis-confirmed</div>
    <div class="legend-item"><span class="sb sb-up2">UP2</span> Likely crisis</div>
    <div class="legend-item"><span class="sb sb-watch">WATCH</span> Confounders</div>
    <div class="legend-item"><span class="sb sb-decel">DECEL</span> Below trend</div>
    <div class="legend-item"><span class="sb sb-na">PEND</span> Pending data</div>
  </div>
  <div class="slide-source" id="sources"></div>
</div>

<script>
// Country order matches the indicators table
const SLIDE_COUNTRIES = [
  'Australia','New Zealand','UK','Germany','Sweden','France',
  'Italy','Spain','Denmark',
  'US','Vietnam','Nepal','Pakistan',
  'South Korea','China','India','Cambodia','Canada',
  'Singapore','Thailand','Philippines','Japan','Malaysia'
];

const SHORT = {
  'Australia':'AU','New Zealand':'NZ','UK':'UK','Germany':'DE','Sweden':'SE',
  'France':'FR','Italy':'IT','Spain':'ES','Denmark':'DK','Norway':'NO',
  'US':'US','Vietnam':'VN','Nepal':'NP','Pakistan':'PK',
  'South Korea':'KR','China':'CN','India':'IN','Cambodia':'KH','Canada':'CA',
  'Singapore':'SG','Thailand':'TH','Philippines':'PH','Japan':'JP','Malaysia':'MY'
};

async function init() {
  const [tracker, sales, meta] = await Promise.all([
    fetch('data/tracker.json').then(r => r.json()),
    fetch('data/sales.json').then(r => r.json()),
    fetch('data/meta.json').then(r => r.json()),
  ]);

  // Header
  document.getElementById('subtitle').innerHTML =
    `Signal heatmap across ${SLIDE_COUNTRIES.length} markets — March/April 2026 ` +
    `<span class="brent-tag">${meta.brent} (${meta.brent_change})</span>`;
  document.getElementById('meta').innerHTML = `ev.energysada.com<br>${meta.date}`;

  // Index tracker data by country
  const weekly = tracker.sections[0]; // WEEKLY VARIABLES
  const metrics = {};
  weekly.metrics.forEach(m => {
    metrics[m.label] = {};
    m.values.forEach(v => { metrics[m.label][v.country] = v.value; });
  });

  // Sales lookup
  const salesByMarket = {};
  sales.forEach(s => { salesByMarket[s.market] = s; });

  // Parse gas price current %
  function parseGasCurrent(v) {
    if (!v) return null;
    const m = v.match(/-->\s*\+?(-?\d+)%/);
    return m ? parseInt(m[1]) : null;
  }
  function parseGasPeak(v) {
    if (!v) return null;
    const m = v.match(/Peak\s*\+?(-?\d+)%/);
    return m ? parseInt(m[1]) : null;
  }
  function parseGasAvg(v) {
    if (!v) return null;
    const before = v.split('-->')[0];
    const nums = before.match(/[+-]?\d+(?=%)/g);
    if (!nums || nums.length === 0) return null;
    const ints = nums.map(n => parseInt(n));
    return Math.round(ints.reduce((a,b) => a+b, 0) / ints.length);
  }

  // Parse GT current %
  function parseGTCurrent(v) {
    if (!v) return null;
    const m = v.match(/-->\s*\+?(-?\d+)%/);
    return m ? parseInt(m[1]) : null;
  }
  function parseGTPeak(v) {
    if (!v) return null;
    const weeks = v.split('-->')[0].trim().split(/\s+/);
    let max = -Infinity;
    weeks.forEach(w => {
      const n = parseInt(w.replace('%','').replace('+',''));
      if (!isNaN(n) && n > max) max = n;
    });
    return max > -Infinity ? max : null;
  }

  // Heat class for a percentage
  function heatPct(p) {
    if (p === null || p === undefined) return 'h0';
    if (p < 0) return 'hn';
    if (p >= 100) return 'h5';
    if (p >= 50) return 'h4';
    if (p >= 25) return 'h3';
    if (p >= 10) return 'h2';
    if (p >= 1) return 'h1';
    return 'h0';
  }

  function fmtPct(p) {
    if (p === null || p === undefined) return '—';
    return (p >= 0 ? '+' : '') + p + '%';
  }

  // Find sales entry for a country
  function findSales(country) {
    // Try exact match first, then partial
    for (const s of sales) {
      if (s.market === country) return s;
      if (s.market.startsWith(country)) return s;
    }
    return null;
  }

  // Swing badge
  function swingBadge(sw) {
    if (!sw) return '<span class="sb sb-na">PEND</span>';
    const map = { up:'sb-up', up2:'sb-up2', watch:'sb-watch', decel:'sb-decel', down:'sb-decel' };
    const label = { up:'UP', up2:'UP2', watch:'WATCH', decel:'DECEL', down:'DOWN' };
    return `<span class="sb ${map[sw]||'sb-na'}">${label[sw]||sw.toUpperCase()}</span>`;
  }

  // Browsing signal shorthand
  function browsingSig(v) {
    if (!v || v === '—') return { cls:'sn', txt:'—' };
    const lower = v.toLowerCase();
    if (lower.includes('3x') || lower.includes('+142') || lower.includes('+24pp') || lower.includes('+70%') || lower.includes('+94'))
      return { cls:'sq', txt: extractShort(v) };
    if (lower.includes('+36') || lower.includes('+28') || lower.includes('+2.1pp') || lower.includes('apps') || lower.includes('+40'))
      return { cls:'sm', txt: extractShort(v) };
    if (lower.includes('+10') || lower.includes('+15'))
      return { cls:'sw', txt: extractShort(v) };
    if (v.length > 2) return { cls:'sm', txt: extractShort(v) };
    return { cls:'sn', txt:'—' };
  }

  function extractShort(v) {
    // Try to extract the key number/metric
    let m;
    m = v.match(/([~+]?\d+[xX%])/);
    if (m) return m[1];
    m = v.match(/(\+[\d.]+pp)/);
    if (m) return m[1];
    if (v.toLowerCase().includes('sensor tower')) return 'apps';
    if (v.length > 20) return v.substring(0, 15) + '...';
    return v;
  }

  // Dealer signal shorthand
  function dealerSig(country, metrics) {
    const dealer = metrics['Dealer enquiries / leads'] || {};
    const showroom = metrics['Showroom demand'] || {};
    const d = dealer[country] || '';
    const s = showroom[country] || '';
    const combined = d + ' ' + s;
    if (!combined.trim() || combined.trim() === '—') return { cls:'sn', txt:'—' };
    if (combined.includes('+66%') || combined.includes('overwhelm') || combined.includes('lots') || combined.includes('+30-50') || combined.includes('+50-60') || combined.includes('cleared'))
      return { cls:'sq', txt: extractDealerShort(combined) };
    if (combined.includes('+28') || combined.includes('+50%') || combined.includes('+85') || combined.includes('+36'))
      return { cls:'sm', txt: extractDealerShort(combined) };
    if (combined.length > 3) return { cls:'sw', txt: extractDealerShort(combined) };
    return { cls:'sn', txt:'—' };
  }

  function extractDealerShort(v) {
    if (v.includes('overwhelm')) return 'surge';
    if (v.includes('lots') && v.includes('clear')) return 'lots clr';
    let m = v.match(/([+]\d+[-]?\d*%)/);
    if (m) return m[1];
    m = v.match(/([+]\d+)/);
    if (m) return m[1] + '%';
    return v.substring(0,12);
  }

  // Used EV signal
  function usedSig(country) {
    const used = metrics['Used EV demand'] || {};
    const v = used[country] || '';
    if (!v || v === '—') return { cls:'sn', txt:'—' };
    const lower = v.toLowerCase();
    if (lower.includes('shortage') || lower.includes('empty') || lower.includes('ath') || lower.includes('surging'))
      return { cls:'sq', txt: lower.includes('ath') ? 'ATH' : lower.includes('shortage') ? 'short' : 'surge' };
    if (lower.includes('+66') || lower.includes('2x') || lower.includes('+12') || lower.includes('aramis'))
      return { cls:'sm', txt: extractShort(v) };
    if (lower.includes('pending') || lower.includes('cox')) return { cls:'sw', txt:'pend' };
    if (v.length > 3) return { cls:'sw', txt: extractShort(v) };
    return { cls:'sn', txt:'—' };
  }

  // Build table
  const cols = SLIDE_COUNTRIES;
  const countryBar = () => {
    let r = '<tr class="cbar"><td></td>';
    cols.forEach(c => { r += `<td class="cbar-cell">${SHORT[c]||c}</td>`; });
    return r + '</tr>';
  };

  let html = '<table class="heatmap"><thead><tr><th class="metric-col"></th>';
  cols.forEach(c => { html += `<th class="c-hdr">${SHORT[c]||c}</th>`; });
  html += '</tr></thead><tbody>';

  // Row: Swing flag
  html += '<tr><td class="ml">Crisis flag</td>';
  cols.forEach(c => {
    const s = findSales(c);
    html += `<td>${swingBadge(s ? s.swing : null)}</td>`;
  });
  html += '</tr>';

  const gasLabel = Object.keys(metrics).find(k => k.includes('Fuel price'));
  const gasData = metrics[gasLabel] || {};

  // Gas current
  html += '<tr><td class="ml">Current</td>';
  cols.forEach(c => {
    const v = gasData[c];
    const p = parseGasCurrent(v);
    if (v && v.includes('BUDI')) {
      html += `<td class="h1">held</td>`;
    } else {
      html += `<td class="${heatPct(p)}">${fmtPct(p)}</td>`;
    }
  });
  html += '</tr>';

  // Gas peak
  html += '<tr><td class="ml">Peak</td>';
  cols.forEach(c => {
    const v = gasData[c];
    const p = parseGasPeak(v);
    if (v && v.includes('BUDI')) {
      html += `<td class="h1">held</td>`;
    } else {
      html += `<td class="${heatPct(p)}">${fmtPct(p)}</td>`;
    }
  });
  html += '</tr>';

  // Hormuz exposure (% of oil supply via Strait of Hormuz)
  const HORMUZ_PCT = {
    'Australia': 30, 'New Zealand': 35, 'UK': 10, 'Germany': 5, 'Sweden': 3,
    'France': 5, 'Italy': 8, 'Spain': 8, 'Denmark': 3,
    'US': 7, 'Vietnam': 85, 'Nepal': 100, 'Pakistan': 80,
    'South Korea': 70, 'China': 38, 'India': 60, 'Cambodia': 20, 'Canada': 0,
    'Singapore': 80, 'Thailand': 57, 'Philippines': 60, 'Japan': 95, 'Malaysia': 0
  };
  const hormuzClass = p => {
    if (p === 0) return 'h0';
    if (p <= 15) return 'h1';
    if (p <= 40) return 'h2';
    return 'hn';
  };
  html += '<tr><td class="ml">Hormuz<br><span style="color:#666;font-size:9px">% of oil via strait</span></td>';
  cols.forEach(c => {
    const p = HORMUZ_PCT[c];
    if (p === undefined) { html += '<td class="h0">—</td>'; }
    else { html += `<td class="${hormuzClass(p)}">~${p}%</td>`; }
  });
  html += '</tr>';

  // Grey bar after fuel price trajectory + Hormuz
  html += countryBar();

  const gt1Label = Object.keys(metrics).find(k => k.includes('"electric car"'));
  const gt2Label = Object.keys(metrics).find(k => k.includes('"EV"'));
  const gt1 = metrics[gt1Label] || {};
  const gt2 = metrics[gt2Label] || {};

  // GT "electric car"
  html += '<tr><td class="ml">"electric car"<br><span style="color:#666;font-size:9px">full term</span></td>';
  cols.forEach(c => {
    const p = parseGTCurrent(gt1[c]);
    html += `<td class="${heatPct(p)}">${fmtPct(p)}</td>`;
  });
  html += '</tr>';

  // GT "EV"
  html += '<tr><td class="ml">"EV"<br><span style="color:#666;font-size:9px">abbreviation</span></td>';
  cols.forEach(c => {
    const p = parseGTCurrent(gt2[c]);
    html += `<td class="${heatPct(p)}">${fmtPct(p)}</td>`;
  });
  html += '</tr>';

  // Grey bar after google trends
  html += countryBar();

  const browseLabel = Object.keys(metrics).find(k => k.includes('Browsing'));
  const browseData = metrics[browseLabel] || {};

  // Browsing
  html += '<tr><td class="ml">Platform /<br>browsing</td>';
  cols.forEach(c => {
    const sig = browsingSig(browseData[c]);
    html += `<td class="${sig.cls}">${sig.txt}</td>`;
  });
  html += '</tr>';

  // Dealer
  html += '<tr><td class="ml">Dealer /<br>enquiries</td>';
  cols.forEach(c => {
    const sig = dealerSig(c, metrics);
    html += `<td class="${sig.cls}">${sig.txt}</td>`;
  });
  html += '</tr>';

  // Grey bar before Used EV
  html += countryBar();

  // Used EV
  html += '<tr><td class="ml">Used EV</td>';
  cols.forEach(c => {
    const sig = usedSig(c);
    html += `<td class="${sig.cls}">${sig.txt}</td>`;
  });
  html += '</tr>';

  html += '</tbody></table>';
  document.getElementById('grid').innerHTML = html;
  document.getElementById('sources').textContent = 'Sources: Google Trends, Edmunds, mobile.de, carsales, AutoTrader, Trade Me, CommBank, FCAI, SMMT, KBA, AVEM, CPCA, Cox Automotive, OFV, MIA';

    const cx = gx(p.gas), cy = gy(p.gt);
    const col = gtColor[p.cls];
    const code = SHORT[p.country] || p.country;
    const off = gtLabelOffset[code] || [14, 4, 'start'];
    const lx = cx + off[0], ly = cy + off[1];
    const ddx = lx - cx, ddy = (ly - 4) - cy;
    const dist = Math.sqrt(ddx*ddx + ddy*ddy) || 1;
    const sx = cx + (ddx/dist)*6.5;
    const sy = cy + (ddy/dist)*6.5;
    const ex = lx - (ddx/dist)*2;
    const ey = (ly - 4) - (ddy/dist)*2;
    g += `<line x1="${sx}" y1="${sy}" x2="${ex}" y2="${ey}" stroke="${col.fill}" stroke-width="0.8" stroke-opacity="0.55"/>`;
    g += `<text x="${lx}" y="${ly}" fill="${col.text}" font-size="11" font-weight="700" text-anchor="${off[2]}">${code}</text>`;
  });

  g += '</svg>';

  const rStr = rVal.toFixed(2);
  let gtHTML = '<div class="gt-section">';
  gtHTML += '<div class="gt-title">EV search interest vs. pump-price shock</div>';
  gtHTML += `<div class="gt-sub">X axis = average pump-price change across crisis weeks (same as previous chart). Y axis = average weekly % change in Google searches for "electric car" (vs. Feb 25 baseline). Dots are colored by exposure category. Across the ${gtPoints.length} markets with both series, Pearson r = ${rStr} — markets with bigger pump pain show more EV search interest, with European Indirect Hit markets (DE, FR) overshooting relative to their modest pump move.</div>`;
  gtHTML += `<div class="gt-chart">${g}</div>`;
  gtHTML += '<div class="gt-legend-row">';
  gtHTML += '<span><span class="gt-ld" style="background:#ef4444"></span>Direct Hit</span>';
  gtHTML += '<span><span class="gt-ld" style="background:#f59e0b"></span>Sleeping Volcano</span>';
  gtHTML += '<span><span class="gt-ld" style="background:#3b82f6"></span>Indirect Hit</span>';
  gtHTML += '</div>';
  gtHTML += '</div>';

  document.getElementById('gt-scatter').innerHTML = gtHTML;
}

init();
</script>
</body>
</html>
